<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Page</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }

        #ld {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            background: #000;
            z-index: 10;
        }

        iframe {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            display: none;

            /* Fix sideways Appetize orientation */
            transform: rotate(90deg) scale(1.78);
            transform-origin: center center;

            background: #000;
        }

        @media (orientation: landscape) {
            iframe {
                transform: none;
                width: 100vw;
                height: 100vh;
            }
        }
    </style>
</head>
<body>

    <div id="ld">Initialising...</div>

    <iframe
        id="ifr"
        allowfullscreen
        allow="autoplay; fullscreen; gamepad; microphone; camera"
    ></iframe>

    <script>
        const iframe = document.getElementById("ifr");

        iframe.src =
            "https://appetize.io/embed/dprul2v3lnp2p2okkylszo6tc4?appearance=light&centered=both&device=pixel7&deviceColor=black&launchUrl=exp://u.expo.dev/933fd9c0-1666-11e7-afca-d980795c5824%3Fruntime-version=exposdk%3A48.0.0&channel-name=production&snack=fWdRX7Kw7&snack-channel=ZFbeKoK6f2&orientation=landscape&params=%7B";

        iframe.onload = () => {
            iframe.style.display = "block";
            document.getElementById("ld").style.display = "none";
        };
    </script>

</body>
</html>
